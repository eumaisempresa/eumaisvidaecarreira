<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU⁺ Vida e Carreira</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; }
        .container { padding: 20px; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #111; font-size: 24px; }
        p { color: #666; line-height: 1.5; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EU⁺ Vida e Carreira</h1>
        <p>Bem-vindo ao seu ecossistema de evolução profissional. Acesse sua área exclusiva para gerenciar suas competências.</p>
        <a href="login.html" class="btn">Área do Protagonista</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Supabase.js"></script>
    <script>
        async function verificarSessao() {
            // 'supabase' vem do seu arquivo Supabase.js
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        document.addEventListener('DOMContentLoaded', verificarSessao);
    </script>
</body>
</html>
