<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU⁺ Vida - Processando Acesso...</title>
  
  <!-- Carrega a biblioteca do Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    const URL_PROJETO = 'https://kofvpmeodonlveeyeqft.supabase.co';
    const CHAVE_ANONIMA = 'sb_publishable_7Fo4zVSx-DZQa5dinQse8w_V4XkETiM';
    
    // Inicializa a conexão com o banco
    const supabase = window.supabase.createClient(URL_PROJETO, CHAVE_ANONIMA);

    // Monitora a chegada do usuário autenticado vindo do e-mail
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session && session.user) {
        const emailUsuario = session.user.email;
        
        try {
          // Busca o plano do usuário na tabela que criamos
          const { data, error } = await supabase
            .from('assinaturas_usuarios')
            .select('plano')
            .eq('email', emailUsuario)
            .single();

          if (error || !data) {
            // Se o e-mail não estiver na tabela, assume o plano gratuito por segurança
            window.location.href = 'dashboard-gratuito.html';
            return;
          }

          // Redireciona de forma inteligente baseado no plano retornado
          switch(data.plano) {
            case 'basico':
              window.location.href = 'dashboard-basico.html';
              break;
            case 'premium':
              window.location.href = 'dashboard-premium.html';
              break;
            case 'executivo':
            case 'personalizado':
              window.location.href = 'dashboard-executivo.html';
              break;
            default:
              window.location.href = 'dashboard-gratuito.html';
          }
        } catch (err) {
          console.error("Erro no roteamento:", err);
          window.location.href = 'dashboard-gratuito.html';
        }
      }
    });
  </script>
</head>
<body>
  <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif; color: #333;">
    <h2>Identificando seu plano de acesso...</h2>
    <p>Por favor, aguarde um instante para ser redirecionado.</p>
  </div>
</body>
</html>
