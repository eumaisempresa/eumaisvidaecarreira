<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU⁺ Vida - Processando Acesso...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>Identificando seu plano de acesso...</h2>
    <p>Por favor, aguarde um instante para ser redirecionado.</p>

    <!-- CONEXÃO E LÓGICA DO SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kofvpmeodonlveeyeqft.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7Fo4zVSx-DZQa5dinQse8w_V4XkETiM';

        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function processarRoteamento() {
            // 1. Verifica se o usuário acabou de vir do link do e-mail e pegou a sessão
            const { data: { session }, error: sessionError } = await clientSupabase.auth.getSession();

            if (sessionError || !session) {
                console.log("Sem sessão ativa. Retornando ao login.");
                window.location.href = 'login.html';
                return;
            }

            const emailUsuario = session.user.email;

            try {
                // 2. Busca o plano real correspondente ao e-mail na tabela 'usuarios'
                const { data, error } = await clientSupabase
                    .from('usuarios')
                    .select('plano')
                    .eq('email', emailUsuario)
                    .single();

                // Se houver erro ou o usuário não estiver na tabela, define como gratuito por segurança
                let planoDefinido = (data && data.plano) ? data.plano.toLowerCase() : 'free';

                // 3. Executa o redirecionamento forçado para as novas páginas baseadas nos extremos
                if (planoDefinido === 'premium') {
                    window.location.href = 'dashboard-premium.html';
                } else if (planoDefinido === 'basico') {
                    // Temporariamente joga para o gratuito até criarmos o básico, evitando links quebrados
                    window.location.href = 'dashboard-gratuito.html';
                } else if (planoDefinido === 'executivo' || planoDefinido === 'personalizado') {
                    window.location.href = 'dashboard-premium.html'; // Pega a experiência máxima por enquanto
                } else {
                    window.location.href = 'dashboard-gratuito.html';
                }

            } catch (err) {
                console.error("Erro no roteamento:", err);
                window.location.href = 'dashboard-gratuito.html';
            }
        }

        // Executa a checagem imediatamente assim que a página abre no navegador
        window.addEventListener('DOMContentLoaded', processarRoteamento);
    </script>
</body>
</html>
