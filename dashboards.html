<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU⁺ Vida - Processando Acesso...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #status-erro {
            color: #ff4d4d;
            font-weight: bold;
            margin-top: 15px;
            display: none;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ffcccc;
            max-width: 90%;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div class="loader" id="loader-icon"></div>
    <h2 id="status-titulo">Identificando seu plano de acesso...</h2>
    <p id="status-subtitulo">Por favor, aguarde um instante para ser redirecionado.</p>
    <div id="status-erro"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kofvpmeodonlveeyeqft.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7Fo4zVSx-DZQa5dinQse8w_V4XkETiM';

        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true // Força o script a caçar os dados do token direto na URL do navegador
            }
        });

        function mostrarErroNaTela(mensagem) {
            document.getElementById('loader-icon').style.display = 'none';
            document.getElementById('status-titulo').textContent = 'Ops! Algo deu errado';
            document.getElementById('status-subtitulo').textContent = 'Veja o detalhe do problema abaixo:';
            
            const erroBox = document.getElementById('status-erro');
            erroBox.textContent = message;
            erroBox.style.display = 'block';
        }

        async function processarRoteamento() {
            try {
                // Pequena pausa para garantir que o navegador processou os hashes da URL do redirecionamento
                await new Promise(resolve => setTimeout(resolve, 800));

                const { data: { session }, error: sessionError } = await clientSupabase.auth.getSession();

                if (sessionError) {
                    mostrarErroNaTela("Erro na sessão: " + sessionError.message);
                    return;
                }

                if (!session) {
                    // Caso não encontre de primeira, tenta validar se o evento disparou a sessão no background
                    const { data: { user } } = await clientSupabase.auth.getUser();
                    if (!user) {
                        window.location.href = 'login.html';
                        return;
                    }
                }

                const emailUsuario = session ? session.user.email : (await clientSupabase.auth.getUser()).data.user.email;

                const { data, error } = await clientSupabase
                    .from('usuarios')
                    .select('plano')
                    .eq('email', emailUsuario)
                    .single();

                if (error) {
                    mostrarErroNaTela("Erro ao ler tabela 'usuarios': " + error.message);
                    return;
                }

                let planoDefinido = (data && data.plano) ? data.plano.toLowerCase() : 'free';

                if (planoDefinido === 'premium') {
                    window.location.href = 'dashboard-premium.html';
                } else {
                    window.location.href = 'dashboard-gratuito.html';
                }

            } catch (err) {
                mostrarErroNaTela("Erro de execução: " + err.message);
            }
        }

        window.addEventListener('DOMContentLoaded', processarRoteamento);
    </script>
</body>
</html>
