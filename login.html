<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU⁺ Vida - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body>
  <h1>Entrar na EU⁺ Vida</h1>
  
  <input type="email" id="email" placeholder="Seu email" required />
  <button onclick="enviarMagicLink()">Enviar Link Mágico</button>

  <p id="mensagem"></p>

  <script>
    async function enviarMagicLink() {
      const email = document.getElementById('email').value;
      const mensagem = document.getElementById('mensagem');

      if (!email) return alert("Digite seu email");

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: window.location.origin + '/dashboard.html' // página após login
        }
      });

      if (error) {
        mensagem.textContent = "Erro: " + error.message;
        mensagem.style.color = "red";
      } else {
        mensagem.textContent = "Link mágico enviado! Verifique sua caixa de entrada.";
        mensagem.style.color = "green";
      }
    }

    // Verificar sessão ao carregar
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
