<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EU⁺ Vida e Carreira</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #080c10; color: #e8edf4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background-color: #0d1520; padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); width: 100%; max-width: 360px; text-align: center; }
        h2 { color: #00d4ff; margin-bottom: 24px; font-size: 22px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #8fa3bb; font-size: 14px; }
        input[type="email"] { width: 100%; padding: 12px; background: #111d2e; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="email"]:focus { border-color: #00d4ff; }
        button { width: 100%; padding: 12px; background-color: #00d4ff; color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .mensagem { margin-top: 15px; font-size: 14px; display: none; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>EU⁺ Vida e Carreira</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">E-mail do Protagonista</label>
                <input type="email" id="login-email" placeholder="seu@email.com" required>
            </div>
            <button type="submit">Receber Link de Acesso</button>
        </form>
        <div id="login-message" class="mensagem"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kofvpmeodonlveeyeqft.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7Fo4zVSx-DZQa5dinQse8w_V4XkETiM';

        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const msgBox = document.getElementById('login-message');

            msgBox.textContent = "Gerando link mágico...";
            msgBox.style.color = "#00d4ff";
            msgBox.style.display = "block";

            const { error } = await clientSupabase.auth.signInWithOtp({
                email: email,
                options: {
                    emailRedirectTo: 'https://eumaisempresa.github.io/eumaisvidaecarreira/dashboard.html'
                }
            });

            if (error) {
                msgBox.textContent = "Erro: " + error.message;
                msgBox.style.color = "#ff3b5c";
            } else {
                msgBox.textContent = "Sucesso! Verifique seu e-mail para acessar a sua Área.";
                msgBox.style.color = "#00e87a";
            }
        });
    </script>
</body>
</html>
