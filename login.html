<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - EU⁺ Vida</title>
  <!-- Carregamento padrão sem o defer para garantir a prioridade na leitura -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#071220; color:white; margin:0; padding:20px; text-align:center; }
    .box { max-width:400px; margin:40px auto; background:rgba(255,255,255,0.1); padding:40px; border-radius:12px; }
    input { width:100%; padding:15px; margin:15px 0; font-size:16px; border-radius:8px; border:none; color:black; }
    button { width:100%; padding:16px; background:#4A9BC4; color:white; border:none; border-radius:8px; font-size:16px; margin-top:10px; cursor:pointer; }
    #status { margin-top:20px; min-height:50px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>EU⁺ Vida</h2>
    <p>Digite seu email</p>
    
    <input type="email" id="email" placeholder="seu@email.com" />
    <button onclick="enviar()">Enviar Link Mágico</button>
    <p id="status"></p>
  </div>

  <script>
    // Configurações locais explícitas para evitar dependência de carregamento externo precoce
    const URL_PROJETO = 'https://kofvpmeodonlveeyeqft.supabase.co';
    const CHAVE_ANONIMA = 'sb_publishable_7Fo4zVSx-DZQa5dinQse8w_V4XkETiM';
    let clienteSupabase = null;

    // Inicialização segura do cliente instanciando direto da biblioteca global carregada
    try {
      if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        clienteSupabase = window.supabase.createClient(URL_PROJETO, CHAVE_ANONIMA, {
          auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
        });
      } else if (typeof supabase !== 'undefined' && supabase.createClient) {
        clienteSupabase = supabase.createClient(URL_PROJETO, CHAVE_ANONIMA, {
          auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
        });
      }
    } catch (e) {
      console.error("Erro ao inicializar o cliente Supabase:", e);
    }

    async function enviar() {
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('status');
      
      if (!email) {
        status.innerHTML = "❌ Digite um email";
        return;
      }

      status.innerHTML = "Enviando link...";

      // Se a inicialização falhou lá atrás, tentamos uma última instância direta aqui
      if (!clienteSupabase) {
        try {
          const escopoSupabase = window.supabase || supabase;
          if (escopoSupabase && escopoSupabase.createClient) {
            clienteSupabase = escopoSupabase.createClient(URL_PROJETO, CHAVE_ANONIMA, {
              auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
            });
          }
        } catch(err) {
          status.innerHTML = "❌ Erro: Biblioteca de autenticação indisponível no momento.";
          return;
        }
      }

      if (!clienteSupabase) {
        status.innerHTML = "❌ Erro: Não foi possível conectar ao provedor de acesso.";
        return;
      }

      try {
        const { error } = await clienteSupabase.auth.signInWithOtp({
          email: email,
          options: {
            emailRedirectTo: "https://eumaisempresa.github.io/eumaisvida/"
          }
        });

        if (error) {
          status.innerHTML = "❌ Erro do Supabase: " + error.message;
          console.error(error);
        } else {
          status.innerHTML = "✅ Link enviado!<br>Verifique sua caixa de entrada e Spam.";
        }
      } catch (err) {
        status.innerHTML = "❌ Falha na requisição. Verifique sua conexão ou tente novamente em instantes.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
