<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - EU⁺ Vida</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#071220; color:white; margin:0; padding:20px; text-align:center; }
    .box { max-width:400px; margin:40px auto; background:rgba(255,255,255,0.1); padding:40px; border-radius:12px; }
    input { width:100%; padding:15px; margin:15px 0; font-size:16px; border-radius:8px; border:none; }
    button { width:100%; padding:16px; background:#4A9BC4; color:white; border:none; border-radius:8px; font-size:16px; margin-top:10px; }
    #status { margin-top:20px; min-height:50px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>EU⁺ Vida</h2>
    <p>Digite seu email</p>
    
    <input type="email" id="email" placeholder="seu@email.com" />
    <button onclick="enviar()">Enviar Link Mágico</button>
    <p id="status"></p>
  </div>

  <script>
    async function enviar() {
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('status');
      
      if (!email) {
        status.innerHTML = "❌ Digite um email";
        return;
      }

      status.innerHTML = "Enviando link...";

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: "https://eumaisempresa.github.io/eumaisvida/dashboard.html"
        }
      });

      if (error) {
        status.innerHTML = "❌ Erro: " + error.message;
        console.error(error);
      } else {
        status.innerHTML = "✅ Link enviado!<br>Verifique sua caixa de entrada e Spam.";
      }
    }
  </script>
</body>
</html>
