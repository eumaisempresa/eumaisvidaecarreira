<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste EU⁺ Vida</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body style="padding:20px;font-family:Arial;background:#071220;color:white;text-align:center;">
  <h2>Teste de Cadastro</h2>
  <p>Use um email real (Gmail, Hotmail, etc)</p>
  
  <input type="email" id="email" placeholder="seuemail@gmail.com" style="width:90%;padding:15px;margin:15px 0;font-size:16px;">
  <br>
  <button onclick="testar()" style="padding:15px 40px;background:#4A9BC4;color:white;border:none;font-size:16px;">Enviar Magic Link</button>
  
  <p id="status" style="margin-top:30px;"></p>

  <script>
    async function testar() {
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('status');
      
      if (!email) {
        status.innerHTML = "Digite um email";
        return;
      }

      status.innerHTML = "Enviando...";

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: "https://eumaisempresa.github.io/eumaisvida/dashboard.html"
        }
      });

      if (error) {
        status.innerHTML = "Erro: " + error.message;
      } else {
        status.innerHTML = "✅ Link enviado!<br>Verifique sua caixa de entrada e Spam.";
      }
    }
  </script>
</body>
</html>
