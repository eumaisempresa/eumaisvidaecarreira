<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EU⁺</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #080c10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #0d1520; padding: 30px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #1e293b; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #334155; background: #111d2e; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00d4ff; color: black; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Entrar</h2>
        <p style="font-size: 14px; color: #8fa3bb;">Digite seu e-mail para receber o link de acesso.</p>
        <input type="email" id="email" placeholder="seu@email.com">
        <button onclick="enviarLink()">Receber Link</button>
        <div id="msg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Supabase.js"></script>
    <script>
        async function enviarLink() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Enviando...";

            const { error } = await supabase.auth.signInWithOtp({
                email: email,
                options: {
                    // AQUI ESTÁ O NOVO ENDEREÇO
                    emailRedirectTo: 'https://eumaisempresa.github.io/eumaisvidaecarreira/dashboard.html'
                }
            });

            if (error) {
                msg.innerText = "Erro: " + error.message;
                msg.style.color = "#ff3b5c";
            } else {
                msg.innerText = "Verifique seu e-mail!";
                msg.style.color = "#00e87a";
            }
        }
    </script>
</body>
</html>
