<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Linha adicionada para dar permissão de conexão ao celular -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://*.supabase.co; connect-src 'self' https://*.supabase.co; style-src 'self' 'unsafe-inline';">
  
  <title>Entrar - EU⁺ Vida</title>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#071220; color:white; margin:0; padding:20px; text-align:center; }
    .box { max-width:400px; margin:40px auto; background:rgba(255,255,255,0.1); padding:40px; border-radius:12px; }
    input { width:100%; padding:15px; margin:15px 0; font-size:16px; border-radius:8px; border:none; color:black; }
    button { width:100%; padding:16px; background:#4A9BC4; color:white; border:none; border-radius:8px; font-size:16px; margin-top:10px; cursor:pointer; }
    #status { margin-top:20px; min-height:50px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>EU⁺ Vida</h2>
    <p>Digite seu email</p>
    
    <input type="email" id="email" placeholder="seu@email.com" />
    <button onclick="enviar()">Enviar Link Mágico</button>
    <p id="status"></p>
  </div>

  <script>
    async function enviar() {
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('status');
      
      if (!email) {
        status.innerHTML = "❌ Digite um email";
        return;
      }

      status.innerHTML = "Enviando link...";

      try {
        if (typeof supabase === 'undefined') {
          status.innerHTML = "❌ Erro: O cliente Supabase não foi carregado. Aguarde 2 segundos e tente novamente.";
          return;
        }

        const { error } = await supabase.auth.signInWithOtp({
          email: email,
          options: {
            emailRedirectTo: "https://eumaisempresa.github.io/eumaisvida/dashboard.html"
          }
        });

        if (error) {
          status.innerHTML = "❌ Erro: " + error.message;
          console.error(error);
        } else {
          status.innerHTML = "✅ Link enviado!<br>Verifique sua caixa de entrada e Spam.";
        }
      } catch (err) {
        status.innerHTML = "❌ Erro inesperado ao executar a requisição de rede.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
