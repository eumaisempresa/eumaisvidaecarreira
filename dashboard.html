<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU⁺ — Autenticando Protagonista</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #080c10; color: #e8edf4; text-align: center; }
        .loader { border: 4px solid #111d2e; border-top: 4px solid #00d4ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-erro { color: #ff3b5c; font-weight: bold; margin-top: 15px; display: none; background: rgba(255,59,92,0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255,59,92,0.2); max-width: 90%; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>Reconhecendo sua assinatura...</h2>
    <p>Conectando ao ecossistema EU⁺ Vida e Carreira.</p>
    <div id="status-erro"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kofvpmeodonlveeyeqft.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7Fo4zVSx-DZQa5dinQse8w_V4XkETiM';

        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true // Captura automática e tratamento local do hash do e-mail
            }
        });

        async function processarRoteamento() {
            try {
                // Aguarda o disparo interno do Supabase para ler a URL vindouro do e-mail
                await new Promise(resolve => setTimeout(resolve, 1000));

                const { data: { session }, error: sessionError } = await clientSupabase.auth.getSession();

                if (sessionError) {
                    document.getElementById('status-erro').textContent = "Erro de Autenticação: " + sessionError.message;
                    document.getElementById('status-erro').style.display = 'block';
                    return;
                }

                if (!session) {
                    // Sem sessão ativa ou pendente, devolve para segurança
                    window.location.href = 'login.html';
                    return;
                }

                // Busca o plano do Protagonista na tabela
                const { data, error } = await clientSupabase
                    .from('usuarios')
                    .select('plano')
                    .eq('email', session.user.email)
                    .single();

                if (error) {
                    // Caso o e-mail não esteja na tabela mas passou pelo Auth, trata como gratuito por padrão de segurança
                    window.location.href = 'dashboard-gratuito.html';
                    return;
                }

                let plano = data && data.plano ? data.plano.toLowerCase() : 'free';

                if (plano === 'premium') {
                    window.location.href = 'dashboard-premium.html';
                } else {
                    window.location.href = 'dashboard-gratuito.html';
                }

            } catch (err) {
                document.getElementById('status-erro').textContent = "Falha no sistema: " + err.message;
                document.getElementById('status-erro').style.display = 'block';
            }
        }

        window.addEventListener('DOMContentLoaded', processarRoteamento);
    </script>
</body>
</html>
